# Tiny Tapeout project information
project:
  title:        "SmartSat-ALU"      
  author:       "Sai Deepak"      
  discord:      ""      
  description:  "Compact 8-bit ALU with arithmetic, logic, and shift operations, featuring saturation arithmetic, status flags, and parity error detection."      
  language:     "Verilog" 
  clock_hz:     1000000       

  tiles: "1x1"          

  top_module:  "tt_um_sai_deepak_alu"

  source_files:
    - "smart_alu8.v"

pinout:
  # Inputs
  ui[0]: "A[0]"
  ui[1]: "A[1]"
  ui[2]: "A[2]"
  ui[3]: "A[3]"
  ui[4]: "B[0]"
  ui[5]: "B[1]"
  ui[6]: "SEL[0]"
  ui[7]: "SEL[1]"

  # Outputs
  uo[0]: "Y[0]"
  uo[1]: "Y[1]"
  uo[2]: "Y[2]"
  uo[3]: "Y[3]"
  uo[4]: "Carry"
  uo[5]: "Zero"
  uo[6]: "Overflow"
  uo[7]: "Parity"

  # Bidirectional pins
  uio[0]: "A[4]"
  uio[1]: "A[5]"
  uio[2]: "A[6]"
  uio[3]: "A[7]"
  uio[4]: "B[2]"
  uio[5]: "B[3]"
  uio[6]: "B[4]"
  uio[7]: "B[5]"

yaml_version: 6
